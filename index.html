<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Bestie aku</title>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.kartu{
    background:white;
    width:350px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid pink;
}

h1{
    color:#ff4f81;
}

p{
    color:#555;
}

.tombol{
    background:#ff4f81;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
}

.tombol:hover{
    background:#ff2e63;
}
</style>
</head>

<body>

<div class="kartu">
    <img src="WhatsApp Image 2026-06-14 at 19.38.31.jpeg">
    <h1>Bestie aku 💕</h1>

    <p>
        Terima kasih sudah menjadi sahabat terbaikku.
        Tetap jadi diri sendiri yang selalu membawa
        kebahagiaan untuk orang-orang di sekitarmu.
    </p>

    <button class="tombol"
    onclick="alert('Bestie terbaik selamanya! 💖')">
    Klik Aku
    </button>
</div>

</body>
</html>
